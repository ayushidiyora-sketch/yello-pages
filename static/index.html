<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YellowPages Scraper</title>
  <style>
    :root{
      --yp:#f5c518; --yp-dark:#e0b200; --ink:#1f2328; --muted:#6b7280;
      --line:#e5e7eb; --bg:#f7f8fa; --card:#fff;
      --green:#1a7f37; --amber:#c47f00; --red:#b00020; --blue:#0a66c2;
    }
    *{box-sizing:border-box}
    body{font-family:system-ui,Segoe UI,Arial,sans-serif;color:var(--ink);
      background:var(--bg);margin:0;padding:32px 16px;line-height:1.5}
    .wrap{max-width:1000px;margin:0 auto}
    h1{font-size:24px;margin:0 0 4px;display:flex;align-items:center;gap:10px}
    h1 .dot{width:26px;height:26px;border-radius:6px;background:var(--yp);display:inline-block}
    .sub{color:var(--muted);margin:0 0 20px;font-size:14px}

    .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;
      padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
    label .req{color:var(--red)}
    input,select{padding:10px 12px;font-size:15px;border:1px solid var(--line);
      border-radius:8px;background:#fff;width:100%;outline:none}
    input:focus,select:focus{border-color:var(--yp);box-shadow:0 0 0 3px rgba(245,197,24,.25)}
    .hint{font-size:11px;color:var(--muted)}

    .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    button{padding:11px 20px;font-size:15px;font-weight:600;border:0;border-radius:8px;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:var(--yp);color:#1f2328}
    .btn-primary:hover:not(:disabled){background:var(--yp-dark)}
    .btn-stop{background:#fff;color:var(--red);border:1px solid var(--red)}
    .btn-stop:hover:not(:disabled){background:#fdecef}
    .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}

    .status{display:flex;align-items:center;gap:10px;margin:20px 0 6px;font-size:16px;font-weight:600;min-height:24px}
    .status .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--amber);
      border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .running{color:var(--amber)}.done{color:var(--green)}.error{color:var(--red)}.stopped{color:var(--muted)}
    .bar{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin:4px 0 16px;display:none}
    .bar>i{display:block;height:100%;background:var(--yp);width:0;transition:width .3s}

    table{border-collapse:collapse;width:100%;background:#fff;border:1px solid var(--line);
      border-radius:10px;overflow:hidden;display:none}
    th,td{padding:9px 12px;font-size:13px;text-align:left;border-bottom:1px solid var(--line)}
    th{background:#fafafa;color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.03em}
    tr:last-child td{border-bottom:0}
    tr:hover td{background:#fffdf5}
    td a{color:var(--blue);text-decoration:none}
    .count{font-size:13px;color:var(--muted);margin:8px 0}
    .empty{color:var(--muted);font-style:italic}

    /* yellowpages-style result cards */
    #results{display:flex;flex-direction:column;gap:12px}
    .yp-card{display:flex;gap:14px;background:#fff;border:1px solid var(--line);
      border-radius:10px;padding:14px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .yp-thumb{flex:0 0 92px;width:92px;height:92px;border-radius:8px;overflow:hidden;
      background:#f0f1f3;display:flex;align-items:center;justify-content:center}
    .yp-thumb img{width:100%;height:100%;object-fit:cover}
    .yp-thumb .ph{font-size:30px;color:#c7ccd3}
    .yp-main{flex:1;min-width:0}
    .yp-name{font-size:17px;font-weight:700;color:var(--blue);text-decoration:none}
    .yp-name:hover{text-decoration:underline}
    .yp-name .rank{color:var(--ink);font-weight:700}
    .yp-cats{font-size:13px;color:#3a3f45;margin:3px 0}
    .yp-links{font-size:13px;margin:4px 0}
    .yp-links a{color:var(--blue);text-decoration:none}
    .yp-links a:hover{text-decoration:underline}
    .yp-links .sep{color:var(--line);margin:0 7px}
    .yp-badges{display:flex;gap:16px;flex-wrap:wrap;margin:6px 0;font-size:12.5px;color:#555}
    .yp-badges .open{color:var(--green);font-weight:600}
    .yp-badges .closed{color:var(--red);font-weight:600}
    .yp-badges .stars{color:#e8a200;letter-spacing:1px}
    .yp-snippet{font-size:13px;color:#555;margin-top:6px;line-height:1.45}
    .yp-snippet b{color:#3a3f45}
    .yp-side{flex:0 0 200px;text-align:right;font-size:13px;color:#3a3f45}
    .yp-phone{font-weight:700;color:var(--ink);font-size:15px;white-space:nowrap}
    .yp-addr{margin-top:6px;color:#555;line-height:1.4}
    @media(max-width:640px){
      .yp-card{flex-wrap:wrap}.yp-side{flex-basis:100%;text-align:left;margin-top:8px}
      .yp-thumb{flex-basis:64px;width:64px;height:64px}
    }

    /* filters modal */
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;
      align-items:center;justify-content:center;z-index:50;padding:16px}
    .modal-back.open{display:flex}
    .modal{background:#fff;border-radius:12px;width:min(720px,100%);max-height:86vh;
      display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.25)}
    .modal-head{display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px;border-bottom:1px solid var(--line)}
    .modal-head h3{margin:0;font-size:18px}
    .modal-head .x{background:none;border:0;font-size:22px;cursor:pointer;color:var(--muted);padding:0 4px}
    .modal-sel{padding:8px 20px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--line)}
    .modal-sel b{color:var(--ink)}
    .tabs{display:flex;gap:4px;padding:10px 16px 0;border-bottom:1px solid var(--line)}
    .tab{padding:8px 14px;font-size:14px;font-weight:600;border:0;background:none;cursor:pointer;
      color:var(--muted);border-bottom:2px solid transparent}
    .tab.active{color:var(--ink);border-bottom-color:var(--yp)}
    .tab:disabled{opacity:.5;cursor:not-allowed}
    .tabpane{display:none;padding:16px 20px;overflow:auto}
    .tabpane.active{display:block}
    .optgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px 18px}
    .opt{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;padding:3px 0;cursor:pointer}
    .opt input{width:auto;margin-top:3px}
    .opt .cnt{color:var(--muted);font-size:12px}
    .opt.disabled{cursor:not-allowed;color:var(--muted)}
    .pane-note{font-size:12.5px;color:var(--amber);background:#fff8e6;border:1px solid #f3e2a8;
      border-radius:7px;padding:8px 10px;margin-bottom:12px}
    .pane-empty{color:var(--muted);font-style:italic;font-size:13px}
    .pane-load{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px}
    .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--line)}

    /* results toolbar (filter + sort applied to scraped data) */
    .resbar{display:flex;align-items:center;justify-content:space-between;gap:12px;
      flex-wrap:wrap;margin:14px 0 6px}
    .resbar .count{margin:0}
    .resbar-controls{display:flex;align-items:center;gap:8px}
    .resbar-controls select{width:auto;padding:8px 10px;font-size:14px}
    .resbar-controls .btn-ghost{padding:8px 14px;font-size:14px;font-weight:600}

    /* pagination */
    #pager{display:flex;align-items:center;justify-content:center;gap:6px;
      flex-wrap:wrap;margin:18px 0 4px}
    #pager button{padding:7px 12px;font-size:14px;font-weight:600;border:1px solid var(--line);
      background:#fff;color:var(--ink);border-radius:7px;cursor:pointer;min-width:38px}
    #pager button:hover:not(:disabled){border-color:var(--yp);background:#fffdf5}
    #pager button.active{background:var(--yp);border-color:var(--yp)}
    #pager button:disabled{opacity:.45;cursor:not-allowed}
    #pager .pinfo{color:var(--muted);font-size:13px;margin:0 8px}
  </style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span> YellowPages Scraper</h1>
  <p class="sub">Search a category in a location, scrape business listings, and export to JSON.</p>

  <div class="panel">
    <div class="grid">
      <div class="field">
        <label>Region</label>
        <select id="region"></select>
        <span class="hint" id="regionHint"></span>
      </div>
      <div class="field">
        <label>Search <span class="req">*</span></label>
        <input id="search" placeholder="e.g. Dentists">
      </div>
      <div class="field">
        <label>Location <span class="req">*</span></label>
        <input id="location" placeholder="e.g. New York, NY">
      </div>
      <div class="field">
        <label>Limit (records)</label>
        <input id="limit" type="number" min="1" placeholder="all" >
        <span class="hint">Leave empty to fetch all available.</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="startBtn" onclick="start()">▶ Start scraping</button>
      <button class="btn-stop" id="stopBtn" onclick="stop()" disabled>■ Stop</button>
      <a id="download" style="display:none" href="#" download><button class="btn-ghost" type="button">⬇ Download JSON</button></a>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="bar" id="bar"><i></i></div>

  <div class="resbar" id="resbar" style="display:none">
    <div class="count" id="count"></div>
    <div class="resbar-controls">
      <button class="btn-ghost" id="filtersBtn" type="button" onclick="openFilters()">⚙ All Filters <span id="filtersCount"></span></button>
      <select id="sort" onchange="applyClientView()" title="Sort results">
        <option value="">Sort: Default</option>
        <option value="name">Sort: Name (A - Z)</option>
        <option value="average_rating">Sort: Rating</option>
      </select>
    </div>
  </div>

  <div id="results"></div>
  <div id="pager"></div>
</div>

<div class="modal-back" id="filtersModal">
  <div class="modal">
    <div class="modal-head">
      <h3>All Filters</h3>
      <button class="x" type="button" onclick="closeFilters()" aria-label="Close">×</button>
    </div>
    <div class="modal-sel">Selected: <b id="selSummary">None</b></div>
    <div class="tabs">
      <button class="tab active" data-tab="categories" onclick="showTab('categories')">Category</button>
      <button class="tab" data-tab="features" onclick="showTab('features')">Features</button>
      <button class="tab" data-tab="neighborhoods" onclick="showTab('neighborhoods')">Neighborhoods</button>
    </div>
    <div class="tabpane active" id="pane-categories"></div>
    <div class="tabpane" id="pane-features"></div>
    <div class="tabpane" id="pane-neighborhoods"></div>
    <div class="modal-foot">
      <button class="btn-ghost" type="button" onclick="clearFilters()">Clear</button>
      <button class="btn-primary" type="button" onclick="applyFilters()">Apply Filters</button>
    </div>
  </div>
</div>

<script>
let timer = null, currentJob = null;

/* ---------- Filters + Sort (applied to scraped data, client-side) ----------
   YP filters/sorts client-side only, so we do the same on the rows we scraped.
   The Category options are DERIVED from the scraped results (so they always match
   what was scraped, with live counts). Features/Neighborhoods aren't captured per
   listing, so those tabs show an explanatory note. Changing a filter/sort re-renders
   instantly — no re-scrape needed. */
let selectedCategories = new Set();
const DISABLED_NOTE = 'Not available from scraped data — listings don’t expose this per record.';

// {label,count}[] built from the scraped rows, most common first
function deriveCategories(rows){
  const counts = new Map();
  (rows||[]).forEach(r => (r.categories||[]).forEach(c=>{
    if(c) counts.set(c, (counts.get(c)||0)+1);
  }));
  return [...counts.entries()]
    .sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]))
    .map(([label,count])=>({label,count}));
}

function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  ['categories','features','neighborhoods'].forEach(n=>
    document.getElementById('pane-'+n).classList.toggle('active', n===name));
}

function renderCategoryPane(){
  const opts = deriveCategories(_rows);
  const pane = document.getElementById('pane-categories'); pane.innerHTML='';
  if(!opts.length){ pane.innerHTML='<div class="pane-empty">No categories in the scraped results.</div>'; return; }
  const grid=document.createElement('div'); grid.className='optgrid';
  opts.forEach(o=>{
    const lab=document.createElement('label'); lab.className='opt';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.value=o.label;
    cb.checked=selectedCategories.has(o.label);
    cb.onchange=()=>{ cb.checked?selectedCategories.add(o.label):selectedCategories.delete(o.label); updateSelSummary(); };
    lab.appendChild(cb);
    lab.insertAdjacentHTML('beforeend',
      ` <span>${esc(o.label)} <span class="cnt">(${o.count})</span></span>`);
    grid.appendChild(lab);
  });
  pane.appendChild(grid);
}

function renderNotePane(name){
  document.getElementById('pane-'+name).innerHTML = `<div class="pane-note">⚠ ${DISABLED_NOTE}</div>`;
}

function openFilters(){
  if(!_rows.length){ alert('Scrape some results first, then filter them.'); return; }
  renderCategoryPane();
  renderNotePane('features');
  renderNotePane('neighborhoods');
  updateSelSummary();
  showTab('categories');
  document.getElementById('filtersModal').classList.add('open');
}

function closeFilters(){ document.getElementById('filtersModal').classList.remove('open'); }
function clearFilters(){
  selectedCategories.clear();
  document.querySelectorAll('#pane-categories input').forEach(cb=>cb.checked=false);
  updateSelSummary();
}
function applyFilters(){ updateFiltersCount(); closeFilters(); applyClientView(); }

function updateSelSummary(){
  const el=document.getElementById('selSummary');
  el.textContent = selectedCategories.size ? [...selectedCategories].join(', ') : 'None';
}
function updateFiltersCount(){
  document.getElementById('filtersCount').textContent = selectedCategories.size ? '('+selectedCategories.size+')' : '';
}

// Filter + sort the scraped rows into _view and re-render (instant, no re-scrape).
function applyClientView(){
  const sort = document.getElementById('sort').value;
  let v = _rows.slice();
  if(selectedCategories.size)
    v = v.filter(r => (r.categories||[]).some(c=>selectedCategories.has(c)));
  if(sort==='name')
    v.sort((a,b)=> (a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase()));
  else if(sort==='average_rating')
    v.sort((a,b)=> ((parseFloat(b.rating)||-1) - (parseFloat(a.rating)||-1)));
  _view = v; _page = 0;
  renderPage();
  updateResultCount();
  updateDownload();
}

function updateResultCount(){
  const cnt=document.getElementById('count');
  const total=_rows.length, shown=_view.length;
  const filtered = selectedCategories.size>0;
  cnt.textContent = filtered
    ? `Showing ${shown} of ${total} records (filtered · ${PAGE_SIZE} per page).`
    : `Showing ${shown} records (${PAGE_SIZE} per page · download JSON for the current view).`;
}

// Full Outscraper column set. Columns we can source are filled from the scraped row +
// website enrichment; the rest (paid-API-only: email validation, whitepages, company
// insights, amenities/range) are present but empty so the file matches Outscraper's shape.
const OUTSCRAPER_COLUMNS = ["query","name","categories","position","amenities","phone",
 "phone.whitepages_phones.phone_type",
 "street","locality","website","snippet","thumbnail","range","business_link",
 "email_1","email_1.emails_validator.status","email_1.emails_validator.status_details","email_1_full_name","email_1_first_name","email_1_last_name","email_1_title",
 "email_2","email_2.emails_validator.status","email_2.emails_validator.status_details",
 "email_3","email_3.emails_validator.status","email_3.emails_validator.status_details",
 "phone_1","phone_1.whitepages_phones.phone_type",
 "phone_2","phone_2.whitepages_phones.phone_type",
 "phone_3","phone_3.whitepages_phones.phone_type",
 "facebook","instagram","linkedin","tiktok","medium","reddit","skype","snapchat","telegram","whatsapp","twitter","vimeo","youtube","github","crunchbase",
 "website_title","website_generator","website_description","website_keywords","website_has_fb_pixel","website_has_google_tag",
 "company_insights.founded_year","company_insights.industry","company_insights.is_public",
 "company_insights.name","company_insights.country","company_insights.state","company_insights.city","company_insights.zip","company_insights.address"];

const COUNTRY = {us:'United States', au:'Australia', ca:'Canada'};

function toOutscraperRow(x, i){
  const region = document.getElementById('region').value;
  const search = document.getElementById('search').value.trim();
  const location = document.getElementById('location').value.trim();
  const em = x.emails || [], es = x.emails_status || [], ph = x.phones_extra || [], pt = x.phones_extra_types || [];
  const ep = x.emails_persons || [];    // {full_name,first_name,last_name,title} per email
  const locality = (x.city || '') + (x.state ? ', ' + x.state : '') + (x.pincode ? ' ' + x.pincode : '');
  const row = {};
  for(const col of OUTSCRAPER_COLUMNS) row[col] = '';   // default empty so every column exists
  Object.assign(row, {
    query: [search, location].filter(Boolean).join(', '),
    name: x.name || '',
    categories: x.category || (x.categories||[]).join(', '),
    position: i + 1,
    amenities: x.amenities || '',
    range: x.range || '',
    phone: x.phone || '',
    'phone.whitepages_phones.phone_type': x.phone_type || '',
    street: x.area || '',
    locality,
    website: x.website || '',
    snippet: x.description || '',
    thumbnail: x.image || '',
    business_link: x.source_url || '',
    email_1: em[0] || '', email_2: em[1] || '', email_3: em[2] || '',
    'email_1.emails_validator.status': (es[0]||[])[0] || '', 'email_1.emails_validator.status_details': (es[0]||[])[1] || '',
    'email_2.emails_validator.status': (es[1]||[])[0] || '', 'email_2.emails_validator.status_details': (es[1]||[])[1] || '',
    'email_3.emails_validator.status': (es[2]||[])[0] || '', 'email_3.emails_validator.status_details': (es[2]||[])[1] || '',
    email_1_full_name:(ep[0]||{}).full_name||'', email_1_first_name:(ep[0]||{}).first_name||'', email_1_last_name:(ep[0]||{}).last_name||'', email_1_title:(ep[0]||{}).title||'',
    phone_1: ph[0] || '', phone_2: ph[1] || '', phone_3: ph[2] || '',
    'phone_1.whitepages_phones.phone_type': pt[0] || '',
    'phone_2.whitepages_phones.phone_type': pt[1] || '',
    'phone_3.whitepages_phones.phone_type': pt[2] || '',
    facebook:x.facebook||'', instagram:x.instagram||'', linkedin:x.linkedin||'', tiktok:x.tiktok||'',
    medium:x.medium||'', reddit:x.reddit||'', skype:x.skype||'', snapchat:x.snapchat||'',
    telegram:x.telegram||'', whatsapp:x.whatsapp||'', twitter:x.twitter||'', vimeo:x.vimeo||'',
    youtube:x.youtube||'', github:x.github||'', crunchbase:x.crunchbase||'',
    website_title:x.website_title||'', website_generator:x.website_generator||'',
    website_description:x.website_description||'', website_keywords:x.website_keywords||'',
    website_has_fb_pixel: !!x.website_has_fb_pixel, website_has_google_tag: !!x.website_has_google_tag,
    'company_insights.founded_year': x.founded_year || '',
    'company_insights.industry': x.industry || '',
    'company_insights.is_public': !!x.is_public,
    'company_insights.name': x.name || '',
    'company_insights.country': COUNTRY[region] || '',
    'company_insights.state': x.state || '',
    'company_insights.city': x.city || '',
    'company_insights.zip': x.pincode || '',
    'company_insights.address': x.area || '',
  });
  return row;
}

// Build the Download JSON from the CURRENT view, shaped to the full Outscraper column set.
let _dlUrl = null;
function updateDownload(){
  const dl=document.getElementById('download');
  if(!_view.length){ dl.style.display='none'; return; }
  if(_dlUrl) URL.revokeObjectURL(_dlUrl);
  const rows=_view.map((x,i)=>toOutscraperRow(x,i));
  const blob=new Blob([JSON.stringify(rows, null, 2)], {type:'application/json'});
  _dlUrl=URL.createObjectURL(blob);
  const safe=s=>(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  dl.href=_dlUrl;
  dl.setAttribute('download',
    `${safe(document.getElementById('search').value)}_${safe(document.getElementById('location').value)}.json`);
  dl.style.display='inline-block';
}
/* ---------- end filters + sort ---------- */

async function loadRegions(){
  const sel = document.getElementById('region');
  try{
    const list = await (await fetch('/api/regions')).json();
    sel.innerHTML = '';
    list.forEach(r=>{
      const o = document.createElement('option');
      o.value = r.code;
      o.textContent = r.label + (r.supported ? '' : ' — not yet supported');
      o.dataset.supported = r.supported;
      sel.appendChild(o);
    });
    sel.value = 'us';
  }catch(e){
    sel.innerHTML = '<option value="us">US (yellowpages.com)</option>';
  }
  updateRegionHint();
}
function updateRegionHint(){
  const opt = document.getElementById('region').selectedOptions[0];
  const hint = document.getElementById('regionHint');
  const ok = !opt || opt.dataset.supported === 'true';
  hint.textContent = ok ? '' : '⚠ This site uses a different layout — parser not implemented yet.';
  hint.style.color = ok ? '' : 'var(--amber)';
}

function setRunning(on){
  document.getElementById('startBtn').disabled = on;
  document.getElementById('stopBtn').disabled = !on;
  document.getElementById('region').disabled = on;
}

async function start(){
  const search = document.getElementById('search').value.trim();
  const location = document.getElementById('location').value.trim();
  const region = document.getElementById('region').value;
  const limRaw = document.getElementById('limit').value.trim();
  const limParsed = parseInt(limRaw, 10);
  const limit = (limRaw && Number.isFinite(limParsed) && limParsed > 0) ? limParsed : null;  // 0/blank/invalid = all
  if(!search || !location){ alert('Search and Location are required.'); return; }

  const r = await fetch('/api/scrape',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({search,location,region,limit})});
  const {job_id} = await r.json();
  currentJob = job_id;

  // reset the view + filter/sort state for the new run
  _rows = []; _view = [];
  selectedCategories.clear(); updateFiltersCount();
  document.getElementById('sort').value = '';
  document.getElementById('resbar').style.display='none';
  document.getElementById('download').style.display='none';
  document.getElementById('results').innerHTML='';
  document.getElementById('pager').innerHTML='';
  document.getElementById('count').textContent='';
  document.getElementById('bar').style.display = limit ? 'block' : 'none';
  document.querySelector('#bar>i').style.width = '0';
  setRunning(true);

  if(timer) clearInterval(timer);
  timer = setInterval(()=>poll(job_id), 1500);
  poll(job_id);
}

async function stop(){
  if(!currentJob) return;
  document.getElementById('stopBtn').disabled = true;
  await fetch('/api/stop/'+currentJob, {method:'POST'});
}

async function poll(job_id){
  const s = await (await fetch('/api/status/'+job_id)).json();
  const el = document.getElementById('status');
  const got = s.total_scraped || 0;
  const cap = s.limit || s.total_available;
  if(cap){
    const pct = Math.min(100, Math.round(got/cap*100));
    document.querySelector('#bar>i').style.width = pct+'%';
  }

  if(s.status==='running'){
    el.className='status running';
    el.innerHTML = '<span class="spin"></span> Scraping… '+got+' records'+(cap?(' / '+cap):'');
  } else {
    clearInterval(timer);
    setRunning(false);
    document.getElementById('bar').style.display='none';
    if(s.status==='done' || s.status==='stopped'){
      el.className='status '+s.status;
      el.textContent = (s.status==='done'?'✅ Done':'⏹ Stopped')+' — '+got+' records scraped';
      showResults(job_id);
    } else if(s.status==='error'){
      el.className='status error';
      el.textContent='❌ Error: '+(s.error||'unknown');
    }
  }
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function starStr(r){const v=parseFloat(r)||0,full=Math.floor(v),half=(v-full)>=0.5;
  return '★'.repeat(full)+(half?'½':'')+'☆'.repeat(Math.max(0,5-full-(half?1:0)));}

const PAGE_SIZE = 20;
let _rows = [], _view = [], _page = 0;   // _rows = all scraped, _view = filtered+sorted

function cardEl(x, i){
  const addr=[x.area,[x.city,x.pincode].filter(Boolean).join(' ')].filter(Boolean);
  const mapsQ=encodeURIComponent([x.name,x.area,x.city].filter(Boolean).join(' '));
  const directions=x.directions||('https://www.google.com/maps/search/?api=1&query='+mapsQ);
  const links=[];
  if(x.website) links.push(`<a href="${esc(x.website)}" target="_blank" rel="noopener">Website</a>`);
  links.push(`<a href="${esc(directions)}" target="_blank" rel="noopener">Directions</a>`);
  if(x.source_url) links.push(`<a href="${esc(x.source_url)}" target="_blank" rel="noopener">More Info</a>`);

  const stars=x.rating?`<span class="stars" title="${esc(x.rating)}">${starStr(x.rating)}</span>${x.reviews_count?(' ('+esc(x.reviews_count)+')'):''}`:'';
  const open=x.open_status?`<span class="${/open/i.test(x.open_status)?'open':'closed'}">${esc(x.open_status.toUpperCase())}</span>`:'';
  const years=x.years_in_business?`<span>🏛 ${esc(x.years_in_business)} Years in Business</span>`:'';
  const badges=[years,open,stars].filter(Boolean).join('');
  const thumb=x.image?`<img src="${esc(x.image)}" alt="" onerror="this.remove()">`:'<span class="ph">🏢</span>';

  const card=document.createElement('div'); card.className='yp-card';
  card.innerHTML=`
    <div class="yp-thumb">${thumb}</div>
    <div class="yp-main">
      <a class="yp-name" href="${esc(x.source_url||'#')}" target="_blank" rel="noopener"><span class="rank">${i+1}.</span> ${esc(x.name)}</a>
      ${x.category?`<div class="yp-cats">${esc(x.category)}</div>`:''}
      <div class="yp-links">${links.join('<span class="sep">|</span>')}</div>
      ${badges?`<div class="yp-badges">${badges}</div>`:''}
      ${x.description?`<div class="yp-snippet"><b>From Business:</b> ${esc(x.description)}</div>`:''}
    </div>
    <div class="yp-side">
      ${x.phone?`<div class="yp-phone">${esc(x.phone)}</div>`:''}
      ${addr.length?`<div class="yp-addr">${addr.map(esc).join('<br>')}</div>`:''}
    </div>`;
  return card;
}

function pinfo(t){const s=document.createElement('span');s.className='pinfo';s.textContent=t;return s;}

function renderPager(){
  const pg=document.getElementById('pager'); pg.innerHTML='';
  const pages=Math.ceil(_view.length/PAGE_SIZE);
  if(pages<=1) return;
  const mk=(label,page,o={})=>{const b=document.createElement('button');b.textContent=label;
    if(o.active)b.className='active'; if(o.disabled)b.disabled=true;
    b.onclick=()=>{_page=page;renderPage();}; return b;};
  pg.appendChild(mk('‹ Prev',_page-1,{disabled:_page===0}));
  let s=Math.max(0,_page-2), e=Math.min(pages-1,_page+2);
  if(s>0){pg.appendChild(mk('1',0,{active:_page===0})); if(s>1)pg.appendChild(pinfo('…'));}
  for(let p=s;p<=e;p++) pg.appendChild(mk(String(p+1),p,{active:p===_page}));
  if(e<pages-1){if(e<pages-2)pg.appendChild(pinfo('…')); pg.appendChild(mk(String(pages),pages-1,{active:_page===pages-1}));}
  pg.appendChild(mk('Next ›',_page+1,{disabled:_page>=pages-1}));
  pg.appendChild(pinfo('Page '+(_page+1)+' of '+pages));
}

function renderPage(){
  const box=document.getElementById('results'); box.innerHTML='';
  const start=_page*PAGE_SIZE;
  _view.slice(start,start+PAGE_SIZE).forEach((x,j)=>box.appendChild(cardEl(x,start+j)));
  renderPager();
}

async function showResults(job_id){
  _rows = await (await fetch('/api/results/'+job_id+'?limit=1000')).json();
  _page = 0;
  document.getElementById('pager').innerHTML='';
  const resbar=document.getElementById('resbar');
  if(!_rows.length){
    _view=[];
    resbar.style.display='none';
    document.getElementById('results').innerHTML='';
    document.getElementById('count').innerHTML='<span class="empty">No listings found for this search/location.</span>';
    return;
  }
  resbar.style.display='flex';        // reveal the filter + sort toolbar
  applyClientView();                  // builds _view, renders, sets count + download
}

document.getElementById('region').addEventListener('change', updateRegionHint);
// close the filters modal when clicking the dark backdrop (but not the dialog itself)
document.getElementById('filtersModal').addEventListener('click', e=>{
  if(e.target.id==='filtersModal') closeFilters();
});
loadRegions();
</script>
